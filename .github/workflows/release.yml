# .github/workflows/release.yml
#
# Builds a zero-dependency Codeably installer for macOS, Windows, and Linux
# whenever a version tag (e.g. v2.0.0) is pushed.
#
# Pipeline per platform:
#   1. Checkout
#   2. Python 3.11 + pip install → PyInstaller → freeze api/main.py → binary
#   3. Node 20 + npm install → electron-builder → installer (.dmg / .exe / .AppImage)
#   4. Upload installer to GitHub Release
#
# End-users just download and install — no Python, no pip, no terminal needed.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            os_name:  mac
          - platform: windows-latest
            os_name:  win
          - platform: ubuntu-22.04
            os_name:  linux

    runs-on: ${{ matrix.platform }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python + PyInstaller ───────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install UPX (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get install -y upx-ucl

      - name: Install UPX (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install upx || true

      - name: Freeze API with PyInstaller
        run: pyinstaller pyinstaller.spec

      # Move the binary into desktop/ where electron-builder expects it
      - name: Stage binary (mac/linux)
        if: matrix.platform != 'windows-latest'
        run: cp dist/codeably-api desktop/codeably-api && chmod +x desktop/codeably-api

      - name: Stage binary (windows)
        if: matrix.platform == 'windows-latest'
        run: copy dist\codeably-api.exe desktop\codeably-api.exe

      # ── 3. Node + electron-builder ────────────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Electron deps
        working-directory: desktop
        run: npm install

      - name: Install Linux system deps (Electron)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            fakeroot dpkg rpm

      - name: Build installer (mac)
        if: matrix.platform == 'macos-latest'
        working-directory: desktop
        env:
          # Code-signing: set these secrets in your repo to enable signed builds.
          #   CSC_LINK            — base64-encoded .p12 certificate
          #   CSC_KEY_PASSWORD    — password for the .p12
          # Leave them unset to produce an unsigned .dmg (users must right-click → Open).
          CSC_LINK:              ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD:      ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' && 'true' || 'false' }}
          # Notarization: set these secrets to auto-notarize after signing.
          #   APPLE_ID            — your Apple developer email
          #   APPLE_APP_SPECIFIC_PASSWORD — app-specific password from appleid.apple.com
          #   APPLE_TEAM_ID       — 10-char Team ID from developer.apple.com
          APPLE_ID:              ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID:         ${{ secrets.APPLE_TEAM_ID }}
        run: npm run build:mac

      - name: Build installer (windows)
        if: matrix.platform == 'windows-latest'
        working-directory: desktop
        run: npm run build:win

      - name: Build installer (linux)
        if: matrix.platform == 'ubuntu-22.04'
        working-directory: desktop
        run: npm run build:linux

      # ── 4. Upload to GitHub Release ───────────────────────────────────────────
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/dist/**/*.dmg
            desktop/dist/**/*.exe
            desktop/dist/**/*.AppImage
            desktop/dist/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
